<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>城市人格测试｜找到最适合你的城市</title>
    <!-- 动画库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- 海报生成库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path d="M10 50 Q 30 30, 50 50 T 90 50" stroke="white" fill="none" stroke-width="2"/><circle cx="20" cy="30" r="3" fill="white"/><circle cx="80" cy="70" r="3" fill="white"/></svg>');
            background-size: 200px 200px;
            pointer-events: none;
        }

        .container {
            max-width: 600px;
            width: 92%;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 48px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3), 0 10px 20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 1;
        }

        .screen {
            display: none;
            padding: 40px 30px;
            min-height: 600px;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        /* 启动页 */
        #start-screen {
            background: linear-gradient(145deg, #667eea22, #764ba222);
            position: relative;
        }

        .start-content {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .city-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(102, 126, 234, 0.3));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .title {
            font-size: 36px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 15px;
            line-height: 1.3;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 18px;
            color: #4a5568;
            margin-bottom: 30px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .feature-badges {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .badge {
            padding: 8px 16px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 30px;
            font-size: 14px;
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
            backdrop-filter: blur(5px);
        }

        .btn {
            padding: 16px 40px;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #f8f9ff;
            transform: translateY(-2px);
        }

        .btn-icon-only {
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
        }

        .btn-icon-only:hover {
            color: #667eea;
        }

        .nav-icon {
            font-size: 20px;
        }

        .wave-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(transparent, rgba(102, 126, 234, 0.1));
            border-radius: 0 0 48px 48px;
        }

        /* 题目页 */
        .quiz-header {
            margin-bottom: 30px;
        }

        .progress-info {
            text-align: center;
            margin-bottom: 10px;
        }

        .progress-text {
            font-size: 16px;
            color: #667eea;
            font-weight: 500;
            background: rgba(102, 126, 234, 0.1);
            padding: 5px 15px;
            border-radius: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #edf2f7;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .question-card {
            background: linear-gradient(145deg, #f8f9ff, #ffffff);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            position: relative;
            overflow: hidden;
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .question-icon {
            font-size: 40px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .question-text {
            font-size: 24px;
            font-weight: 600;
            color: #2d3748;
            line-height: 1.4;
            position: relative;
            z-index: 1;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            padding: 20px 25px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 18px;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-family: inherit;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #667eea22, transparent);
            transition: width 0.3s ease;
        }

        .option-btn:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.15);
        }

        .option-btn:hover::before {
            width: 100%;
        }

        .option-btn.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            transform: scale(1.02);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .dots-container {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e2e8f0;
            transition: all 0.3s ease;
        }

        .dot.active {
            width: 24px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        /* 结果页 */
        .result-card {
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        .result-badge {
            font-size: 14px;
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .city-showcase {
            margin-bottom: 20px;
        }

        .city-icon-large {
            font-size: 100px;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 20px rgba(102, 126, 234, 0.3));
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .result-city {
            font-size: 52px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .result-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tag {
            padding: 8px 20px;
            background: linear-gradient(145deg, #f8f9ff, #ffffff);
            border-radius: 30px;
            font-size: 14px;
            color: #667eea;
            border: 1px solid #667eea33;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.1);
        }

        .quote-card {
            background: #f8f9ff;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            border: 1px solid #667eea33;
        }

        .quote-icon {
            font-size: 60px;
            color: #667eea33;
            position: absolute;
            top: 10px;
            left: 20px;
            font-family: serif;
        }

        .result-desc {
            font-size: 18px;
            color: #4a5568;
            line-height: 1.7;
            position: relative;
            z-index: 1;
            font-style: italic;
        }

        .match-rate {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            background: white;
            padding: 15px 20px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .match-label {
            font-size: 16px;
            color: #718096;
            min-width: 50px;
        }

        .match-bar {
            flex: 1;
            height: 8px;
            background: #edf2f7;
            border-radius: 10px;
            overflow: hidden;
        }

        .match-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        .match-number {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            min-width: 50px;
            text-align: right;
        }

        /* 匹配理由 */
        .match-reason {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            text-align: left;
            border-left: 4px solid #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .reason-title {
            font-size: 14px;
            color: #a0aec0;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .reason-text {
            font-size: 16px;
            color: #4a5568;
            line-height: 1.6;
        }

        .city-features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .feature-item {
            background: #f8f9ff;
            padding: 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #4a5568;
            border: 1px solid #e2e8f0;
        }

        /* 其他城市推荐 */
        .other-cities {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px dashed #e2e8f0;
        }

        .other-title {
            font-size: 16px;
            color: #718096;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .other-city-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: #f8f9ff;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .other-city-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .other-city-icon {
            font-size: 24px;
        }

        .other-city-name {
            font-size: 16px;
            font-weight: 500;
            color: #4a5568;
        }

        .other-city-match {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100px;
        }

        .other-match-bar {
            height: 6px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .other-match-rate {
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
            min-width: 40px;
        }

        /* 六角形图 */
        .radar-chart-container {
            margin: 30px 0;
            padding: 20px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .chart-title {
            font-size: 16px;
            color: #4a5568;
            margin-bottom: 15px;
            font-weight: 500;
        }

        #radar-chart {
            max-width: 100%;
            height: auto;
            margin: 0 auto;
        }

        .result-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .result-actions .btn {
            flex: 1;
            padding: 16px 20px;
        }

        /* 海报样式 */
        .poster-container {
            width: 400px;
            background: linear-gradient(145deg, #4158D0, #C850C0);
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            display: none;
        }

        .poster-content {
            background: white;
            border-radius: 30px;
            padding: 30px 25px;
            text-align: center;
        }

        .poster-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            color: #a0aec0;
            font-size: 14px;
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 20px;
        }

        .poster-icon {
            font-size: 24px;
        }

        .poster-title {
            letter-spacing: 3px;
            font-weight: 500;
        }

        .poster-main {
            margin-bottom: 30px;
        }

        .poster-label {
            font-size: 14px;
            color: #a0aec0;
            margin-bottom: 10px;
        }

        .poster-city {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #4158D0, #C850C0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .poster-quote {
            font-size: 20px;
            color: #C850C0;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .poster-desc {
            font-size: 16px;
            color: #718096;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .poster-tags {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .poster-tag {
            padding: 4px 12px;
            background: #f7fafc;
            border-radius: 20px;
            font-size: 12px;
            color: #667eea;
        }

        .poster-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #cbd5e0;
            border-top: 1px dashed #e2e8f0;
            padding-top: 20px;
        }

        .poster-date {
            font-weight: 500;
        }

        .poster-qrcode {
            background: #f7fafc;
            padding: 4px 12px;
            border-radius: 20px;
            color: #667eea;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .container {
                width: 95%;
                margin: 10px auto;
                border-radius: 32px;
            }
            
            .screen {
                padding: 30px 20px;
                min-height: 550px;
            }
            
            .title {
                font-size: 30px;
            }
            
            .city-icon {
                font-size: 60px;
            }
            
            .question-text {
                font-size: 20px;
            }
            
            .option-btn {
                padding: 16px 20px;
                font-size: 16px;
            }
            
            .result-city {
                font-size: 42px;
            }
            
            .result-actions {
                flex-direction: column;
            }
            
            .match-rate {
                flex-wrap: wrap;
            }
            
            .city-features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<script>
// ========== 综合防护系统 v2.0（加强版）==========
(function() {
    // ===== 配置区 =====
    const CONFIG = {
        DEBUG: false,  // 正式使用必须false
        SHARE_EXPIRY: 30,
        ALLOW_MULTI_DEVICE: false,
    };
    
    // ===== 邀请码数据库 =====
    const INVITE_CODES = {
        'ADMIN2025': { maxUses: 9999, expires: null, note: '管理员专用' },
        'TESTER': { maxUses: 9999, expires: null, note: '测试员' },
        'CITY001': { maxUses: 9999, expires: null, note: '给用户' },
    };
    
    const USAGE_KEY = 'invite_code_usage';
    
    function getUsageRecords() {
        var records = localStorage.getItem(USAGE_KEY);
        return records ? JSON.parse(records) : {};
    }
    
    function saveUsageRecord(code, deviceId) {
        var records = getUsageRecords();
        if (!records[code]) {
            records[code] = [];
        }
        records[code].push({
            deviceId: deviceId,
            time: new Date().toISOString(),
            userAgent: navigator.userAgent
        });
        localStorage.setItem(USAGE_KEY, JSON.stringify(records));
    }
    
    function getDeviceFingerprint() {
        var screen = screen.width + 'x' + screen.height;
        var timezone = new Date().getTimezoneOffset();
        var lang = navigator.language;
        var platform = navigator.platform;
        var raw = screen + '|' + timezone + '|' + lang + '|' + platform;
        
        var hash = 0;
        for (var i = 0; i < raw.length; i++) {
            hash = ((hash << 5) - hash) + raw.charCodeAt(i);
            hash |= 0;
        }
        return Math.abs(hash).toString(16);
    }
    
    function isCodeValid(code) {
        if (CONFIG.DEBUG) return true;
        
        var codeInfo = INVITE_CODES[code];
        if (!codeInfo) return false;
        
        if (codeInfo.expires) {
            var expiryDate = new Date(codeInfo.expires);
            if (new Date() > expiryDate) return false;
        }
        
        var records = getUsageRecords();
        var usedCount = records[code] ? records[code].length : 0;
        
        if (usedCount >= codeInfo.maxUses) return false;
        
        if (!CONFIG.ALLOW_MULTI_DEVICE) {
            var deviceId = getDeviceFingerprint();
            if (records[code]) {
                var deviceUsed = records[code].some(r => r.deviceId === deviceId);
                if (deviceUsed) return true;
                if (usedCount >= codeInfo.maxUses) return false;
            }
        }
        
        return true;
    }
    
    function checkShareLink() {
        var params = new URLSearchParams(window.location.search);
        var share = params.get('share');
        var fp = params.get('fp');
        var exp = params.get('exp');
        
        if (share) {
            var now = Date.now();
            
            if (exp && now > parseInt(exp)) {
                showBlockMessage('分享链接已过期，请向分享者索要新的链接');
                return false;
            }
            
            var currentFp = getDeviceFingerprint();
            if (fp && fp !== currentFp) {
                var firstVisit = sessionStorage.getItem('first_visit');
                if (firstVisit === 'true') {
                    showBlockMessage('此链接仅限个人使用，无法二次分享');
                    return false;
                } else {
                    sessionStorage.setItem('first_visit', 'true');
                }
            }
        }
        return true;
    }
    
    function checkInviteCode() {
        var params = new URLSearchParams(window.location.search);
        var code = params.get('code');
        
        if (CONFIG.DEBUG) {
            console.log('调试模式：跳过验证');
            return true;
        }
        
        var isAuthorized = sessionStorage.getItem('authorized') === 'true';
        var usedCode = sessionStorage.getItem('used_code');
        
        if (isAuthorized && usedCode) {
            return true;
        }
        
        if (code) {
            if (isCodeValid(code)) {
                var deviceId = getDeviceFingerprint();
                saveUsageRecord(code, deviceId);
                
                sessionStorage.setItem('authorized', 'true');
                sessionStorage.setItem('used_code', code);
                
                window.location.href = window.location.pathname;
                return false;
            } else {
                showCodeInput('邀请码无效或已用完');
                return false;
            }
        }
        
        if (window.location.href.includes('share=1') || window.location.href.includes('code=')) {
            var fullUrl = window.location.href;
            var codeMatch = fullUrl.match(/[?&]code=([^&]+)/);
            var shareMatch = fullUrl.match(/[?&]share=1/);
            
            if (codeMatch) {
                var extractedCode = codeMatch[1];
                if (isCodeValid(extractedCode)) {
                    var deviceId = getDeviceFingerprint();
                    saveUsageRecord(extractedCode, deviceId);
                    sessionStorage.setItem('authorized', 'true');
                    sessionStorage.setItem('used_code', extractedCode);
                    window.location.href = window.location.pathname;
                    return false;
                }
            }
            
            if (shareMatch) {
                var fpMatch = fullUrl.match(/fp=([^&]+)/);
                var expMatch = fullUrl.match(/exp=([^&]+)/);
                if (fpMatch && expMatch) {
                    var fp = fpMatch[1];
                    var exp = parseInt(expMatch[1]);
                    var now = Date.now();
                    
                    if (now <= exp) {
                        var currentFp = getDeviceFingerprint();
                        if (fp === currentFp) {
                            sessionStorage.setItem('authorized', 'true');
                            sessionStorage.setItem('used_code', 'share_link');
                            window.location.href = window.location.pathname;
                            return false;
                        }
                    }
                }
            }
        }
        
        showCodeInput();
        return false;
    }
    
    function showCodeInput(errorMsg) {
        document.body.innerHTML = '';
        
        var container = document.createElement('div');
        container.innerHTML = `
            <div style="
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                font-family: 'PingFang SC', sans-serif;
                padding: 20px;
                z-index: 999999;
            ">
                <div style="
                    background: white;
                    border-radius: 30px;
                    padding: 40px;
                    max-width: 400px;
                    width: 100%;
                    text-align: center;
                    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                ">

                    ${errorMsg ? `<p style="color: #ff4444; margin-bottom: 15px;">${errorMsg}</p>` : ''}
                    <input type="text" id="code-input" placeholder="例如: CITY001" style="
                        width: 100%;
                        padding: 15px;
                        border: 2px solid ${errorMsg ? '#ff4444' : '#e0e0e0'};
                        border-radius: 15px;
                        font-size: 16px;
                        margin-bottom: 20px;
                        font-family: inherit;
                        box-sizing: border-box;
                        outline: none;
                    ">
                    <button onclick="window.submitCode()" style="
                        width: 100%;
                        padding: 15px;
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        color: white;
                        border: none;
                        border-radius: 15px;
                        font-size: 16px;
                        font-weight: 500;
                        cursor: pointer;
                        font-family: inherit;
                        transition: transform 0.2s;
                    " onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">
                        开始测试
                    </button>
                    <p style="color: #999; font-size: 12px; margin-top: 20px;">
                        ⚠️ 如果打不开，请关闭UC/夸克的“云端加速”或切换到移动网络
                    </p>
                </div>
            </div>
        `;
        document.body.appendChild(container);
        
        window.submitCode = function() {
            var input = document.getElementById('code-input').value.trim();
            if (input) {
                window.location.href = window.location.pathname + '?code=' + input;
            } else {
                alert('请输入邀请码');
            }
        };
    }
    
    function showBlockMessage(message) {
        document.body.innerHTML = `
            <div style="
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                font-family: 'PingFang SC', sans-serif;
                padding: 20px;
                z-index: 999999;
            ">
                <div style="
                    background: white;
                    border-radius: 30px;
                    padding: 40px;
                    max-width: 400px;
                    text-align: center;
                ">
                    <div style="font-size: 50px; margin-bottom: 20px;">🔒</div>
                    <h3 style="color: #333; margin-bottom: 15px;">无法访问</h3>
                    <p style="color: #666; margin-bottom: 25px;">${message}</p>
                    <button onclick="location.href=location.pathname" style="
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        color: white;
                        border: none;
                        padding: 12px 30px;
                        border-radius: 50px;
                        font-size: 16px;
                        cursor: pointer;
                    ">返回首页</button>
                </div>
            </div>
        `;
    }
    
    window.getShareLink = function() {
        var fp = getDeviceFingerprint();
        var expiry = Date.now() + CONFIG.SHARE_EXPIRY * 60 * 1000;
        var baseUrl = window.location.href.split('?')[0];
        var shareUrl = baseUrl + '?share=1&fp=' + fp + '&exp=' + expiry;
        
        navigator.clipboard.writeText(shareUrl).then(function() {
            alert('分享链接已复制到剪贴板，有效期' + CONFIG.SHARE_EXPIRY + '分钟');
        }).catch(function() {
            prompt('复制这个链接分享给对方：', shareUrl);
        });
        
        return shareUrl;
    };
    
    window.CodeManager = {
        list: function() {
            var records = getUsageRecords();
            var result = {};
            for (var code in INVITE_CODES) {
                var info = INVITE_CODES[code];
                var used = records[code] ? records[code].length : 0;
                result[code] = {
                    note: info.note,
                    maxUses: info.maxUses,
                    used: used,
                    remaining: info.maxUses - used,
                    expires: info.expires || '永久'
                };
            }
            console.table(result);
            return result;
        },
        resetCode: function(code) {
            var records = getUsageRecords();
            delete records[code];
            localStorage.setItem(USAGE_KEY, JSON.stringify(records));
            console.log('已重置', code);
        }
    };
    
    try {
        if (CONFIG.DEBUG) {
            console.log('调试模式：所有验证已关闭');
            return;
        }
        
        if (!checkShareLink()) {
            throw new Error('Share link check failed');
        }
        
        if (!checkInviteCode()) {
            throw new Error('Invite code check failed');
        }
        
        if (!sessionStorage.getItem('authorized')) {
            showCodeInput('请先输入邀请码');
            throw new Error('Not authorized');
        }
        
    } catch(e) {
        console.log('验证拦截:', e.message);
    }
})();
</script>

// 绘制六角形图
function drawRadarChart(city, matchRate) {
    var canvas = document.getElementById('radar-chart');
    if (!canvas) return;
    
    var ctx = canvas.getContext('2d');
    var width = canvas.width;
    var height = canvas.height;
    var centerX = width / 2;
    var centerY = height / 2;
    var radius = 100;
    
    ctx.clearRect(0, 0, width, height);
    
    var values = [
        matchRate / 100,
        Math.min(0.9, matchRate / 100 + 0.1),
        Math.min(0.85, matchRate / 100 - 0.05),
        Math.min(0.95, matchRate / 100 + 0.15),
        Math.min(0.88, matchRate / 100 + 0.08),
        Math.min(0.82, matchRate / 100 - 0.08)
    ];
    
    var labels = ['综合匹配', '职业发展', '生活品质', '文化氛围', '自然环境', '生活成本'];
    
    // 绘制背景六边形
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
        var angle = (i * 60 - 90) * Math.PI / 180;
        var x = centerX + radius * Math.cos(angle);
        var y = centerY + radius * Math.sin(angle);
        if (i === 0) {
            ctx.moveTo(x, y);
        } else {
            ctx.lineTo(x, y);
        }
    }
    ctx.closePath();
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 1;
    ctx.stroke();
    
    // 绘制数据区域
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
        var angle = (i * 60 - 90) * Math.PI / 180;
        var value = values[i] * radius;
        var x = centerX + value * Math.cos(angle);
        var y = centerY + value * Math.sin(angle);
        if (i === 0) {
            ctx.moveTo(x, y);
        } else {
            ctx.lineTo(x, y);
        }
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
    ctx.fill();
    ctx.strokeStyle = '#667eea';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // 绘制数据点
    for (var i = 0; i < 6; i++) {
        var angle = (i * 60 - 90) * Math.PI / 180;
        var value = values[i] * radius;
        var x = centerX + value * Math.cos(angle);
        var y = centerY + value * Math.sin(angle);
        
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, 2 * Math.PI);
        ctx.fillStyle = '#667eea';
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
    
    // 绘制标签
    ctx.font = '12px "PingFang SC"';
    ctx.fillStyle = '#718096';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    for (var i = 0; i < 6; i++) {
        var angle = (i * 60 - 90) * Math.PI / 180;
        var labelX = centerX + (radius + 20) * Math.cos(angle);
        var labelY = centerY + (radius + 20) * Math.sin(angle);
        ctx.fillText(labels[i], labelX, labelY);
    }
}

// 绑定事件
function bindEvents() {
    startBtn.addEventListener('click', function() {
        startScreen.classList.remove('active');
        quizScreen.classList.add('active');
        renderQuestion();
    });

    restartBtn.addEventListener('click', function() {
        restartTest();
    });

    prevBtn.addEventListener('click', function() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            renderQuestion();
        }
    });

    shareBtn.addEventListener('click', function() {
        generatePoster();
    });
}

// 渲染题目
function renderQuestion() {
    var q = questions[currentQuestionIndex];
    questionText.innerText = q.text;
    currentQuestionSpan.innerText = currentQuestionIndex + 1;
    
    var progress = ((currentQuestionIndex + 1) / questions.length) * 100;
    progressFill.style.width = progress + '%';

    var optionsHtml = '';
    for (var i = 0; i < q.options.length; i++) {
        var opt = q.options[i];
        var isSelected = (selectedOptions[currentQuestionIndex] === i);
        var selectedClass = isSelected ? 'selected' : '';
        optionsHtml += '<button class="option-btn ' + selectedClass + '" data-opt-index="' + i + '">' + opt.text + '</button>';
    }
    optionsContainer.innerHTML = optionsHtml;

    var optionButtons = document.querySelectorAll('.option-btn');
    for (var i = 0; i < optionButtons.length; i++) {
        optionButtons[i].addEventListener('click', onOptionClick);
    }

    updateDots();

    if (currentQuestionIndex === 0) {
        prevBtn.style.visibility = 'hidden';
    } else {
        prevBtn.style.visibility = 'visible';
    }
}

function updateDots() {
    var dotsHtml = '';
    for (var i = 0; i < questions.length; i++) {
        var activeClass = (i === currentQuestionIndex) ? 'active' : '';
        dotsHtml += '<span class="dot ' + activeClass + '"></span>';
    }
    dotsContainer.innerHTML = dotsHtml;
}

function onOptionClick(e) {
    var optIndex = parseInt(e.target.getAttribute('data-opt-index'));
    var q = questions[currentQuestionIndex];
    var prevSelected = selectedOptions[currentQuestionIndex];

    if (prevSelected !== undefined) {
        var prevOpt = q.options[prevSelected];
        for (var cityId in prevOpt.scores) {
            if (userScores[cityId] !== undefined) {
                userScores[cityId] -= prevOpt.scores[cityId];
            }
        }
    }

    var newOpt = q.options[optIndex];
    for (var cityId in newOpt.scores) {
        if (userScores[cityId] !== undefined) {
            userScores[cityId] += newOpt.scores[cityId];
        }
    }

    selectedOptions[currentQuestionIndex] = optIndex;

    var allOptions = document.querySelectorAll('.option-btn');
    for (var i = 0; i < allOptions.length; i++) {
        allOptions[i].classList.remove('selected');
    }
    e.target.classList.add('selected');

    if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    var cityScores = [];
    for (var i = 0; i < cities.length; i++) {
        var city = cities[i];
        var score = userScores[city.id] || 0;
        cityScores.push({
            id: city.id,
            name: city.name,
            score: score,
            desc: city.desc,
            tags: city.tags,
            icon: city.icon,
            features: city.features
        });
    }
    
    cityScores.sort(function(a, b) {
        return b.score - a.score;
    });
    
    var topCity = cityScores[0];
    var otherCitiesList = cityScores.slice(1, 4);
    
    var maxPossibleScore = 30 * 3 * 2;
    var matchRate = Math.min(99, Math.round((topCity.score / maxPossibleScore) * 100) + 60);
    
    var bestCity = cities.find(c => c.id === topCity.id);
    
    var reason = generateMatchReason(bestCity, matchRate, userScores);
    
    resultCityIcon.innerText = bestCity.icon || '🏙️';
    resultCity.innerText = bestCity.name;
    resultDesc.innerText = bestCity.desc;
    
    var tagsHtml = '';
    for (var i = 0; i < bestCity.tags.length; i++) {
        tagsHtml += '<span class="tag">#' + bestCity.tags[i] + '</span>';
    }
    resultTags.innerHTML = tagsHtml;
    
    matchFill.style.width = matchRate + '%';
    matchNumber.innerText = matchRate + '%';
    
    matchReason.innerText = reason;
    
    var featuresHtml = '';
    if (bestCity.features) {
        for (var i = 0; i < bestCity.features.length; i++) {
            featuresHtml += '<div class="feature-item">' + bestCity.features[i] + '</div>';
        }
    }
    cityFeatures.innerHTML = featuresHtml;
    
    var otherCitiesHtml = '';
    for (var i = 0; i < otherCitiesList.length; i++) {
        var city = otherCitiesList[i];
        var cityInfo = cities.find(c => c.id === city.id);
        var cityMatchRate = Math.min(99, Math.round((city.score / maxPossibleScore) * 100) + 50);
        otherCitiesHtml += `
            <div class="other-city-item">
                <div class="other-city-left">
                    <span class="other-city-icon">${cityInfo.icon || '🏙️'}</span>
                    <span class="other-city-name">${city.name}</span>
                </div>
                <div class="other-city-match">
                    <div class="other-match-bar" style="width: ${cityMatchRate}%;"></div>
                    <span class="other-match-rate">${cityMatchRate}%</span>
                </div>
            </div>
        `;
    }
    otherCities.innerHTML = otherCitiesHtml;
    
    quizScreen.classList.remove('active');
    resultScreen.classList.add('active');
    
    posterCity.innerText = bestCity.name;
    posterQuote.innerText = bestCity.shortDesc || bestCity.tags.slice(0, 2).join(' · ');
    posterDesc.innerText = bestCity.desc.split('，')[0] + '…';
    
    var posterTagsHtml = '';
    for (var i = 0; i < Math.min(3, bestCity.tags.length); i++) {
        posterTagsHtml += '<span class="poster-tag">#' + bestCity.tags[i] + '</span>';
    }
    posterTags.innerHTML = posterTagsHtml;
    
    var today = new Date();
    var year = today.getFullYear();
    var month = today.getMonth() + 1;
    var day = today.getDate();
    posterDate.innerText = year + '年' + month + '月' + day + '日';
    
    setTimeout(function() {
        drawRadarChart(bestCity, matchRate);
    }, 100);
}

function restartTest() {
    currentQuestionIndex = 0;
    selectedOptions = [];
    
    for (var i = 0; i < cities.length; i++) {
        userScores[cities[i].id] = 0;
    }

    resultScreen.classList.remove('active');
    quizScreen.classList.add('active');
    renderQuestion();
}

function generatePoster() {
    var posterContainer = document.getElementById('poster-container');
    posterContainer.style.display = 'block';

    html2canvas(posterContainer, {
        scale: 2,
        backgroundColor: null,
        logging: false,
        allowTaint: false,
        useCORS: true
    }).then(function(canvas) {
        var link = document.createElement('a');
        link.download = '我的城市归宿-' + posterCity.innerText + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();

        posterContainer.style.display = 'none';
    }).catch(function(error) {
        console.log('生成海报失败:', error);
        alert('生成海报失败，请稍后重试');
        posterContainer.style.display = 'none';
    });
}

window.onload = function() {
    bindEvents();
};
